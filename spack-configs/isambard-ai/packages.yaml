packages:
  nvhpc:
    externals:
    - spec: nvhpc@25.1+blas~lapack~mpi
      prefix: /home/b6c/orca2.b6c/spack/opt/spack/linux-neoverse_v2/nvhpc-25.1-4xbco3ppcgzu7bzoc52hb7ov2rsukvi4/Linux_aarch64/25.1/compilers
      extra_attributes:
        compilers:
          c: /home/b6c/orca2.b6c/spack/opt/spack/linux-neoverse_v2/nvhpc-25.1-4xbco3ppcgzu7bzoc52hb7ov2rsukvi4/Linux_aarch64/25.1/compilers/bin/nvc
          cxx: /home/b6c/orca2.b6c/spack/opt/spack/linux-neoverse_v2/nvhpc-25.1-4xbco3ppcgzu7bzoc52hb7ov2rsukvi4/Linux_aarch64/25.1/compilers/bin/nvc++
          fortran: /home/b6c/orca2.b6c/spack/opt/spack/linux-neoverse_v2/nvhpc-25.1-4xbco3ppcgzu7bzoc52hb7ov2rsukvi4/Linux_aarch64/25.1/compilers/bin/nvfortran
        #flags:
        #  cflags: --gcc-toolchain=/usr/bin/gcc-13
        #  cxxflags: --gcc-toolchain=/usr/bin/gcc-13
    - spec: nvhpc@24.11
      prefix: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/compilers
      extra_attributes:
        compilers:
          c: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/compilers/bin/nvc
          cxx: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/compilers/bin/nvc++
          fortran: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/compilers/bin/nvfortran
        flags:
          cflags: --gcc-toolchain=/usr/bin/gcc-13
          cxxflags: --gcc-toolchain=/usr/bin/gcc-13
  all:
    providers:
      c: [gcc, nvhpc, cce]
      cxx: [gcc, nvhpc, cce]
      fortran: [gcc, nvhpc, cce]
      fftw-api: [cray-fftw, fftw, nvpl-fft]
      blas: [cray-libsci, blis, openblas]
      lapack: [cray-libsci, openblas]
      mpi: [cray-mpich, openmpi]
      pkgconfig: [pkg-config]
    variants: +cuda cuda_arch=90
    permissions:
      write: group
  gcc:
    externals:
    - spec: gcc@12.3.0 languages='c,c++,fortran'
      prefix: /usr
      extra_attributes:
        compilers:
          c: /usr/bin/gcc-12
          cxx: /usr/bin/g++-12
          fortran: /usr/bin/gfortran-12
        flags: {}
    - spec: gcc@13.3.0 languages='c,c++,fortran'
      prefix: /usr
      extra_attributes:
        compilers:
          c: /usr/bin/gcc-13
          cxx: /usr/bin/g++-13
          fortran: /usr/bin/gfortran-13
        flags: {}
    - spec: gcc@14.2.0 languages='c,c++,fortran'
      prefix: /usr
      extra_attributes:
        compilers:
          c: /usr/bin/gcc-14
          cxx: /usr/bin/g++-14
          fortran: /usr/bin/gfortran-14
        flags: {}

  cce:
    externals:
    - spec: cce@18.0.0
      prefix: /opt/cray/pe/cce/18.0.0
      extra_attributes:
        compilers:
          c: /opt/cray/pe/cce/18.0.0/bin/craycc
          cxx: /opt/cray/pe/cce/18.0.0/bin/craycxx
          fortran: /opt/cray/pe/cce/18.0.0/bin/crayftn
        # Not supported in archspec so specify here.
        flags:
          cflags: -target-cpu=arm-grace
          cxxflags: -target-cpu=arm-grace
          fflags: -target-cpu=arm-grace
    - spec: cce@19.0.0
      prefix: /opt/cray/pe/cce/19.0.0
      extra_attributes:
        compilers:
          c: /opt/cray/pe/cce/19.0.0/bin/craycc
          cxx: /opt/cray/pe/cce/19.0.0/bin/craycxx
          fortran: /opt/cray/pe/cce/19.0.0/bin/crayftn
        # Not supported in archspec so specify here.
        flags:
          cflags: -target-cpu=arm-grace
          cxxflags: -target-cpu=arm-grace
          fflags: -target-cpu=arm-grace

  numactl:
    require:
    - '%gcc'
  xz:
    require:
    - '%gcc'
  openmpi:
    variants: +cuda fabrics=ofi cuda_arch=90
  mpich:
    variants: +cuda+fortran~hydra pmi=cray device=ch4 netmod=ofi cuda_arch=90

  cray-mpich:
    buildable: false
    version: [8.1.32]
    externals:
    - spec: cray-mpich@8.1.32 %gcc@12
      prefix: /opt/cray/pe/mpich/8.1.32/ofi/gnu/12.3
      extra_attributes:
        environment:
          prepend_path:
            LD_LIBRARY_PATH: /opt/cray/libfabric/1.22.0/lib64/
    - spec: cray-mpich@8.1.32 %cce@18
      prefix: /opt/cray/pe/mpich/8.1.32/ofi/cray/17.0
      extra_attributes:
        environment:
          prepend_path:
            LD_LIBRARY_PATH: /opt/cray/libfabric/1.22.0/lib64/
    - spec: cray-mpich@8.1.32 %nvhpc@24.11
      prefix: /opt/cray/pe/mpich/8.1.32/ofi/nvidia/23.3
      extra_attributes:
        environment:
          prepend_path:
            LD_LIBRARY_PATH: /opt/cray/libfabric/1.22.0/lib64/
    - spec: cray-mpich@8.1.32 %nvhpc@25.1
      prefix: /opt/cray/pe/mpich/8.1.32/ofi/nvidia/23.3
      extra_attributes:
        environment:
          prepend_path:
            LD_LIBRARY_PATH: /opt/cray/libfabric/1.22.0/lib64/

  cuda:
    buildable: false
    version: [12.6.0]
    externals:
    - spec: cuda@12.6.0 %gcc@12
      prefix: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/cuda/12.6
    - spec: cuda@12.6.0 %cce@18
      prefix: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/cuda/12.6
    - spec: cuda@12.6.0 %nvhpc@24.11
      prefix: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/cuda/12.6
    - spec: cuda@12.6.0 %nvhpc@25.1
      prefix: /opt/nvidia/hpc_sdk/Linux_aarch64/24.11/cuda/12.6

  libfabric:
    buildable: false
    version: [1.22.0]
    externals:
    - spec: libfabric@1.22.0
      prefix: /opt/cray/libfabric/1.22.0
      modules: [libfabric/1.22.0]
  cray-pmi:
    buildable: false
    version: [6.1.15]
    externals:
    - spec: cray-pmi@6.1.15
      prefix: /opt/cray/pe/pmi/6.1.15
      modules: [cray-pmi/6.1.15]
  python:
    externals:
    - spec: python@3.11.7
      prefix: /opt/cray/pe/python/3.11.7
      modules: [cray-python/3.11.7]
  autoconf:
    externals:
    - prefix: /usr
      spec: autoconf@2.69
  automake:
    externals:
    - prefix: /usr
      spec: automake@1.15.1
  binutils:
    externals:
    - prefix: /usr
      spec: binutils@2.43.1~gold~headers
  bison:
    externals:
    - prefix: /usr
      spec: bison@3.0.4
  cmake:
    externals:
    - prefix: /usr
      spec: cmake@3.28.3
  coreutils:
    externals:
    - prefix: /usr
      spec: coreutils@8.32
  curl:
    externals:
    - prefix: /usr
      spec: curl@8.6.0+gssapi+ldap+nghttp2
  diffutils:
    externals:
    - prefix: /usr
      spec: diffutils@3.6
  findutils:
    externals:
    - prefix: /usr
      spec: findutils@4.8.0
  flex:
    externals:
    - prefix: /usr
      spec: flex@2.6.4+lex
  gawk:
    externals:
    - prefix: /usr
      spec: gawk@4.2.1
  gettext:
    externals:
    - prefix: /usr
      spec: gettext@0.21.1
  git:
    externals:
    - prefix: /usr
      spec: git@2.43.0~tcltk
  gmake:
    externals:
    - prefix: /usr
      spec: gmake@4.2.1
  groff:
    externals:
    - prefix: /usr
      spec: groff@1.22.4
  libtool:
    externals:
    - prefix: /usr
      spec: libtool@2.4.6
  m4:
    externals:
    - prefix: /usr
      spec: m4@1.4.18
  openssh:
    externals:
    - prefix: /usr
      spec: openssh@9.6p1
  openssl:
    externals:
    - prefix: /usr
      spec: openssl@3.1.4
  perl:
    externals:
    - prefix: /usr
      spec: perl@5.26.1~cpanm+opcode+open+shared+threads
  pkg-config:
    externals:
    - prefix: /usr
      spec: pkg-config@0.29.2
  sed:
    externals:
    - prefix: /usr
      spec: sed@4.9
  tar:
